version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - supabase-db

  supabase-db:
    image: supabase/postgres:15
    container_name: supabase_db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - supabase_data:/var/lib/postgresql/data

  supabase-api:
    image: supabase/postgrest:v10.2.0
    container_name: supabase_api
    restart: always
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
    ports:
      - "3000:3000"
    depends_on:
      - supabase-db

  supabase-auth:
    image: supabase/gotrue:v2.64.0
    container_name: supabase_auth
    restart: always
    environment:
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@supabase-db:5432/${POSTGRES_DB}
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "9999:9999"
    depends_on:
      - supabase-db

volumes:
  supabase_data:
